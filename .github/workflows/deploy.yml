name: Deploy to GitHub Pages

on:
   push:
      branches: [main]
   workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Node
          uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: npm

        - name: Install dependencies
          run: npm install --no-audit --no-fund

        - name: Typecheck
          run: npm run typecheck

        - name: Build
          run: npm run build

        - name: Copy 404.html into dist (belt-and-suspenders)
          run: |
            if [ -f public/404.html ] && [ ! -f dist/404.html ]; then
              cp public/404.html dist/404.html
            fi

        - name: Setup Pages
          uses: actions/configure-pages@v5

        - name: Upload artifact
          uses: actions/upload-pages-artifact@v3
          with:
            path: dist

    deploy:
      needs: build
      runs-on: ubuntu-latest
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      steps:
        - name: Deploy
          id: deployment
          uses: actions/deploy-pages@v4
